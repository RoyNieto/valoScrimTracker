# Configuración de la Base de Datos
spring.datasource.url=jdbc:postgresql://localhost:5432/scrim_tracker_db
spring.datasource.username=coach_admin
spring.datasource.password=valopro_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
gemini.api.key=${GEMINI_API_KEY}

# Aumentar el límite de subida de archivos (Para capturas de VALORANT)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB